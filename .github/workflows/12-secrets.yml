name: 12 - Secrets and Variables

on: workflow_dispatch

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Show variable (visible)
        run: |
          echo "Variable value: ${{ vars.MY_PUBLIC_CONFIG }}"
      
      - name: Show secret (masked)
        run: |
          echo "Secret value: ${{ secrets.MY_SECRET_PASSWORD }}"
          echo "Length: ${#SECRET_VAR}"
        env:
          SECRET_VAR: ${{ secrets.MY_SECRET_PASSWORD }}
      
      - name: Try to bypass mask (will still be masked)
        run: |
          SECRET="${{ secrets.MY_SECRET_PASSWORD }}"
          echo "First char: ${SECRET:0:1}"
          echo "Reversed: $(echo $SECRET | rev)"
