name: 08 - Matrix

on: workflow_dispatch

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: ['17', '21']
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      
      - name: Show what I'm running
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Java: ${{ matrix.java }}"
      
      - name: Run tests
        run: mvn test
