name: 18 - Token Permissions

on: workflow_dispatch

permissions:
  contents: read
  issues: write

jobs:
  show-token-info:
    runs-on: ubuntu-latest
    steps:
      - name: Token basic info
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Token length is ${#TOKEN}"
          echo "Token starts with ${TOKEN:0:4}"

      - name: Call GitHub API to read repo info
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/${{ github.repository }} | head -20

      - name: Try to create an issue using the token
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d '{"title":"Created by GitHub Actions","body":"This issue was created automatically by workflow 18"}'
