name: 01 - Hello World

on: push

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "Hello, GitHub Actions!"
      
      - name: Show the date
        run: date
      
      - name: Show where we are
        run: pwd
      
      - name: List files
        run: ls -la
