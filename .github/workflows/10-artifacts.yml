name: 10 - Artifacts

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build the jar
        run: mvn package -DskipTests
      
      - name: Show what was built
        run: ls -lh target/
      
      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download the jar
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./downloaded
      
      - name: Verify file
        run: |
          ls -lh ./downloaded/
          echo "File received successfully!"
      
      - name: Pretend to deploy
        run: |
          echo "Would now scp this jar to the production server..."
          echo "Or push it to Nexus/Artifactory..."
