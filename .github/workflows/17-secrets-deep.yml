name: 17 - Secrets Deep Dive

on: workflow_dispatch

jobs:
  masking-boundary:
    runs-on: ubuntu-latest
    steps:
      # ============================================================
      # 测试1: 标准遮罩(secret 出现在日志里被替换成 ***)
      # ============================================================
      - name: Test 1 - Standard masking
        run: echo "Secret: ${{ secrets.MY_SECRET_PASSWORD }}"
        # 预期输出: Secret: ***
      
      # ============================================================
      # 测试2: 通过环境变量使用 secret
      # ============================================================
      - name: Test 2 - Via env var
        env:
          PASS: ${{ secrets.MY_SECRET_PASSWORD }}
        run: |
          # 直接 echo $PASS 也会被遮罩
          echo "Direct echo: $PASS"
          
          # 但能拿到长度等元信息
          echo "Length: ${#PASS}"
          
          # 注意:如果你把 secret 拼到URL里,URL也会被遮罩
          echo "https://api.com/?key=$PASS"
      
      # ============================================================
      # 测试3: 遮罩的"逃逸"(不要做,只是教学)
      # 这些都能让 secret 部分泄露,所以日志遮罩不能完全依赖
      # ============================================================
      - name: Test 3 - Masking can be escaped (DO NOT do this!)
        env:
          PASS: ${{ secrets.MY_SECRET_PASSWORD }}
        run: |
          # 方法1: base64 编码——遮罩看不出来
          echo "Encoded: $(echo $PASS | base64)"
          
          # 方法2: 拆字符
          echo "First char: ${PASS:0:1}"
          echo "Last char: ${PASS: -1}"
          
          # 方法3: 转十六进制
          echo "Hex: $(echo $PASS | xxd -p)"
        # 这些操作 GitHub 的遮罩可能盖不住!
        # 真实工作里:绝对不要写任何"打印 secret 衍生数据"的代码
        # 也是为什么 GH-200 安全考点强调"日志遮罩不是真正的安全防线"
