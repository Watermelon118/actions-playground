name: 17 - Secrets Deep Dive

on: workflow_dispatch

jobs:
  masking-boundary:
    runs-on: ubuntu-latest
    steps:
      # ============================================================
      # 测试1: 标准遮罩 - 通过 env 注入,然后 echo
      # ============================================================
      - name: Test 1 - Standard masking
        env:
          PASS: ${{ secrets.MY_SECRET_PASSWORD }}
        run: echo "Secret: $PASS"
        # 预期输出: Secret: ***
      
      # ============================================================
      # 测试2: secret 嵌入字符串里也会被遮罩
      # ============================================================
      - name: Test 2 - Embedded in URL
        env:
          PASS: ${{ secrets.MY_SECRET_PASSWORD }}
        run: |
          # 直接 echo
          echo "Direct echo: $PASS"
          
          # 拼接到URL里——GitHub 仍然会遮罩 secret 部分
          echo "https://api.com/?key=$PASS"
          
          # 元信息可以拿到
          echo "Length: ${#PASS}"
      
      # ============================================================
      # 测试3: 遮罩的"逃逸"(教学反例,DO NOT do this)
      # ============================================================
      - name: Test 3 - Masking can be escaped
        env:
          PASS: ${{ secrets.MY_SECRET_PASSWORD }}
        run: |
          # 方法1: base64 编码
          echo "Encoded: $(echo $PASS | base64)"
          
          # 方法2: 拆字符
          echo "First char: ${PASS:0:1}"
          echo "Last char: ${PASS: -1}"
          
          # 方法3: 十六进制
          echo "Hex: $(echo $PASS | xxd -p)"
